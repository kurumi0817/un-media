<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美容施術診断</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        }

        body {
        font-family: 'Noto Sans JP', sans-serif;
        background: linear-gradient(#fcedf4 0%);
        min-height: 100vh;
        padding: 20px;
        }

        .container {
        max-width: 640px;
        margin: 0 auto;
        }

        /* ヘッダー */
        .header {
        text-align: center;
        padding: 40px 20px;
        animation: fadeInDown 0.8s ease;
        }

        .header h1 {
        font-size: 1.8rem;
        font-weight: 700;
        background: linear-gradient(#1f294e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 12px;
        }

        .header p {
        color: #6b7280;
        font-size: 0.95rem;
        }

        /* プログレスバー */
        .progress-container {
        background: #fff;
        border-radius: 20px;
        padding: 20px 24px;
        margin-bottom: 24px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .progress-text {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-size: 0.85rem;
        color: #6b7280;
        }

        .progress-bar {
        height: 8px;
        background: #e5e7eb;
        border-radius: 10px;
        overflow: hidden;
        }

        .progress-fill {
        height: 100%;
        background: linear-gradient(#1f294e);
        border-radius: 10px;
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 質問カード */
        .question-card {
        background: #fff;
        border-radius: 24px;
        padding: 32px 24px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        animation: slideIn 0.5s ease;
        display: none;
        }

        .question-card.active {
        display: block;
        }

        .question-number {
        display: inline-block;
        background: linear-gradient(#1f294e);
        color: #fff;
        font-size: 0.75rem;
        font-weight: 700;
        padding: 6px 14px;
        border-radius: 20px;
        margin-bottom: 16px;
        }

        .question-text {
        font-size: 1.25rem;
        font-weight: 700;
        color: #1f2937;
        margin-bottom: 24px;
        line-height: 1.6;
        }

        /* 選択肢 */
        .options {
        display: flex;
        flex-direction: column;
        gap: 12px;
        }

        .option-btn {
        display: flex;
        align-items: center;
        gap: 14px;
        background: #fafafa;
        border: 2px solid #e5e7eb;
        border-radius: 16px;
        padding: 18px 20px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: left;
        }

        .option-btn:hover {
        border-color: #1f294e;
        transform: translateY(-2px);
        }

        .option-btn .icon {
        font-size: 1.5rem;
        }

        .option-btn .text {
        font-size: 1rem;
        font-weight: 500;
        color: #374151;
        }

        /* 結果画面 */
        .result-card {
        display: none;
        animation: fadeIn 0.8s ease;
        }

        .result-card.active {
        display: block;
        }

        .result-header {
        background: linear-gradient(#1f294e);
        border-radius: 24px 24px 0 0;
        padding: 40px 24px;
        text-align: center;
        color: #fff;
        }

        .result-header .label {
        font-size: 0.85rem;
        opacity: 0.9;
        margin-bottom: 8px;
        }

        .result-header .treatment-name {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 12px;
        }

        .result-header .match-rate {
        display: inline-block;
        background: rgba(255,255,255,0.2);
        padding: 8px 20px;
        border-radius: 20px;
        font-size: 0.9rem;
        }

        .result-body {
        background: #fff;
        border-radius: 0 0 24px 24px;
        padding: 32px 24px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        .result-section {
        margin-bottom: 28px;
        }

        .result-section:last-child {
        margin-bottom: 0;
        }

        .result-section h3 {
        font-size: 1rem;
        font-weight: 700;
        color: #1f2937;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        }

        .result-section h3::before {
        content: '';
        display: inline-block;
        width: 4px;
        height: 18px;
        background: linear-gradient(#1f294e);
        border-radius: 2px;
        }

        .result-section p {
        color: #4b5563;
        line-height: 1.8;
        font-size: 0.95rem;
        }

        /* 特徴リスト */
        .feature-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        }

        .feature-item {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        background: #f9fafb;
        padding: 16px;
        border-radius: 12px;
        }

        .feature-item .icon {
        font-size: 1.2rem;
        flex-shrink: 0;
        }

        .feature-item .content strong {
        display: block;
        font-size: 0.9rem;
        color: #374151;
        margin-bottom: 4px;
        }

        .feature-item .content span {
        font-size: 0.85rem;
        color: #6b7280;
        }

        /* クリニックカード */
        .clinic-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        }

        .clinic-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #f9fafb;
        padding: 16px;
        border-radius: 12px;
        transition: all 0.3s ease;
        }

        .clinic-card:hover {
        background: #f3f4f6;
        }

        .clinic-info {
        display: flex;
        align-items: center;
        gap: 12px;
        }

        .clinic-info .rank {
        background: linear-gradient(#1f294e);
        color: #fff;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        font-weight: 700;
        }

        .clinic-info .name {
        font-weight: 600;
        color: #374151;
        }

        .clinic-info .tag {
        font-size: 0.75rem;
        color: #9ca3af;
        }

        .clinic-card .arrow {
        color: #9ca3af;
        }

        /* CTAボタン */
        .cta-buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 24px;
        }

        .cta-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 18px 24px;
        border-radius: 14px;
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s ease;
        }

        .cta-btn.primary {
        background: linear-gradient(#1f294e);
        color: #fff;
        }

        .cta-btn.primary:hover {
        transform: translateY(-2px);
        }

        .cta-btn.secondary {
        background: #fff;
        color: #6b7280;
        border: 2px solid #e5e7eb;
        }

        .cta-btn.secondary:hover {
        border-color: #d4a5ff;
        color: #a78bfa;
        }

        /* 再診断ボタン */
        .restart-btn {
        display: block;
        text-align: center;
        margin-top: 24px;
        color: #9ca3af;
        font-size: 0.9rem;
        cursor: pointer;
        transition: color 0.3s ease;
        }

        .restart-btn:hover {
        color: #a78bfa;
        }

        /* アニメーション */
        @keyframes fadeInDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
        }

        @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateX(30px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
        }

        @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
        }

        /* レスポンシブ */
        @media (max-width: 480px) {
        .header h1 {
            font-size: 1.5rem;
        }
        .result-header .treatment-name {
            font-size: 1.6rem;
        }
        }
    </style>
    </head>
    <body>
    <div class="container">
        <!-- ヘッダー -->

        </div>
        </div>

        <div class="question-card" data-question="2">

            <button class="option-btn" data-value="budget">
            <span class="icon">💰</span>
            <span class="text">価格を抑えたい</span>
            </button>
            <button class="option-btn" data-value="minimal">
            <span class="icon">🌿</span>
            <span class="text">ダウンタイムを少なくしたい</span>
            </button>
        </div>
        </div>

        <div class="question-card" data-question="3">
        <span class="question-number">Q3</span>
        <h2 class="question-text">痛みやダウンタイムに抵抗はありますか？</h2>
        <div class="options">
            <button class="option-btn" data-value="avoid">
            <span class="icon">😌</span>
            <span class="text">できるだけ避けたい</span>
            </button>
            <button class="option-btn" data-value="okay">
            <span class="icon">👍</span>
            <span class="text">多少なら問題ない</span>
            </button>
            <button class="option-btn" data-value="fine">
            <span class="icon">💪</span>
            <span class="text">気にしない</span>
            </button>
        </div>
        </div>

        <div class="question-card" data-question="4">
        <span class="question-number">Q4</span>
        <h2 class="question-text">どれくらいの期間で改善したいですか？</h2>
        <div class="options">
            <button class="option-btn" data-value="asap">
            <span class="icon">🚀</span>
            <span class="text">すぐにでも改善したい</span>
            </button>
            <button class="option-btn" data-value="months">
            <span class="icon">📅</span>
            <span class="text">1〜3ヶ月以内</span>
            </button>
            <button class="option-btn" data-value="slow">
            <span class="icon">🌱</span>
            <span class="text">ゆっくり改善したい</span>
            </button>
        </div>
        </div>

        <!-- 結果画面 -->

            <p class="label">あなたにおすすめの施術は</p>
            <h2 class="treatment-name" id="treatmentName">ピコレーザー</h2>
            <span class="match-rate" id="matchRate">マッチ度 95%</span>
        </div>
        <div class="result-body">
            <div class="result-section">
            <h3>おすすめの理由</h3>
            <p id="reasonText">あなたの回答をもとに診断しました。</p>
            </div>

            <div class="result-section">
            <h3>施術の特徴</h3>
            <div class="feature-list" id="featureList">
                <!-- 動的に挿入 -->
            </div>
            </div>

            <div class="result-section">
            <h3>おすすめクリニック</h3>
            <div class="clinic-list" id="clinicList">
                <!-- 動的に挿入 -->
            </div>
            </div>

            <div class="cta-buttons">

            </a>
            <a href="#" class="cta-btn secondary" id="ctaSecondary">
                <span>📖</span>

            </a>
            </div>

            <p class="restart-btn" onclick="restartQuiz()">もう一度診断する</p>
        </div>
        </div>
    </div>

            { icon: '⏱️', title: 'ダウンタイム', desc: 'ほぼなし（軽い赤み程度）' },
            { icon: '👤', title: '向いている人', desc: 'コスパ重視で脱毛したい方' }
            ],
            clinics: [
            { name: 'エミナルクリニック', tag: '全身脱毛が安い' },
            { name: 'レジーナクリニック', tag: '追加料金なし' },
            { name: 'リゼクリニック', tag: '保証充実' }
            ]
        },
        hair_power: {
            name: '医療脱毛（ハイパワー）',
            matchRate: 94,
            reason: '効果重視のあなたに最適な高出力プランです。少ない回数で確実な脱毛効果が期待できます。',
            features: [
            { icon: '⚡', title: '効果', desc: '3〜5回で高い脱毛効果を実感' },
            { icon: '⏱️', title: 'ダウンタイム', desc: 'ほぼなし' },
            { icon: '👤', title: '向いている人', desc: '短期間で確実に脱毛したい方' }
            ],
            clinics: [
            { name: 'レジーナクリニック', tag: 'ジェントルマックスプロ' },
            { name: 'アリシアクリニック', tag: '最新機器導入' },
            { name: 'フレイアクリニック', tag: '蓄熱式で痛み軽減' }
            ]
        }
        };

        // 診断ロジック
        function diagnose() {
        const concern = answers[1]; // Q1: 悩み
        const priority = answers[2]; // Q2: 優先事項
        const pain = answers[3]; // Q3: 痛みへの抵抗
        const timeline = answers[4]; // Q4: 期間

        let result = '';

        // シミ・くすみ
        if (concern === 'spots') {
            if (priority === 'quick' || timeline === 'asap') {
            result = 'pico_laser';
            } else if (priority === 'minimal' || pain === 'avoid') {
            result = 'pico_toning';
            } else {
            result = 'ipl';
            }
        }
        // 毛穴・ニキビ
        else if (concern === 'pores') {
            if (priority === 'quick' && pain !== 'avoid') {
            result = 'dermapen';
            } else if (priority === 'minimal' || pain === 'avoid') {
            result = 'peeling';
            } else {
            result = 'potenza';
            }
        }
        // 小顔・たるみ
        else if (concern === 'sagging') {
            if (priority === 'quick' || timeline === 'asap' || pain === 'avoid') {
            result = 'hifu';
            } else {
            result = 'thread_lift';
            }
        }
        // 脱毛
        else if (concern === 'hair') {
            if (priority === 'budget') {
            result = 'hair_budget';
            } else {
            result = 'hair_power';
            }
        }

        return treatments[result];
        }

        // 結果を表示
        function showResult() {
        const result = diagnose();
        
        document.getElementById('progressContainer').style.display = 'none';
        document.getElementById('treatmentName').textContent = result.name;
        document.getElementById('matchRate').textContent = `マッチ度 ${result.matchRate}%`;
        document.getElementById('reasonText').textContent = result.reason;

        // 特徴リスト
        const featureList = document.getElementById('featureList');
        featureList.innerHTML = result.features.map(f => `
            <div class="feature-item">
            <span class="icon">${f.icon}</span>
            <div class="content">
                <strong>${f.title}</strong>
                <span>${f.desc}</span>
            </div>
            </div>
        `).join('');

        // クリニックリスト
        const clinicList = document.getElementById('clinicList');
        clinicList.innerHTML = result.clinics.map((c, i) => `
            <div class="clinic-card">
            <div class="clinic-info">
                <span class="rank">${i + 1}</span>
                <div>
                <p class="name">${c.name}</p>
                <p class="tag">${c.tag}</p>
                </div>
            </div>
            <span class="arrow">→</span>
            </div>
        `).join('');

        document.getElementById('resultCard').classList.add('active');
        }

        // 進捗更新
        function updateProgress() {
        const percent = ((currentQuestion - 1) / totalQuestions) * 100;
        document.getElementById('progressFill').style.width = `${percent}%`;
        document.getElementById('progressPercent').textContent = `${Math.round(percent)}%`;
        }

        // 次の質問へ
        function nextQuestion(value) {
        answers[currentQuestion] = value;
        
        // 現在の質問を非表示
        document.querySelector(`.question-card[data-question="${currentQuestion}"]`).classList.remove('active');
        
        currentQuestion++;
        updateProgress();

        if (currentQuestion > totalQuestions) {
            // 結果表示
            setTimeout(showResult, 300);
        } else {
            // 次の質問を表示
            setTimeout(() => {
            document.querySelector(`.question-card[data-question="${currentQuestion}"]`).classList.add('active');
            }, 200);
        }
        }

        // 再診断
        function restartQuiz() {
        currentQuestion = 1;
        Object.keys(answers).forEach(key => delete answers[key]);
        
        document.getElementById('resultCard').classList.remove('active');
        document.getElementById('progressContainer').style.display = 'block';
        
        document.querySelectorAll('.question-card').forEach(card => {
            card.classList.remove('active');
        });
        document.querySelector('.question-card[data-question="1"]').classList.add('active');
        
        updateProgress();
        }

        // イベントリスナー設定
        document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            nextQuestion(this.dataset.value);
        });
        });

        // 初期化
        updateProgress();
    </script>
</body>
</html>
